# Logrotate config for ai-trading-agent
# P1.7: prevent unbounded log growth

# Rotate all trading bot log files
/root/ai-trading-agent/diary.jsonl
/root/ai-trading-agent/llm_requests.log
/root/ai-trading-agent/prompts.log
{
    daily
    rotate 7
    compress
    delaycompress
    missingok
    notifempty
    maxsize 100M
}

/root/ai-trading-agent/trade_log.json
/root/ai-trading-agent/active_trades.json
/root/ai-trading-agent/circuit_state.json
{
    daily
    rotate 7
    compress
    delaycompress
    missingok
    notifempty
    maxsize 10M
}
